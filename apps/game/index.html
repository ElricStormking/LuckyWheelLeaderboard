<!doctype html>
<html lang="en" class="desktop-framed">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#020b11" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lucky Wheel" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <title>Lucky Wheel Prototype</title>
  </head>
  <body>
    <div id="app-shell">
      <div id="game-root"></div>
    </div>
    <div id="mobile-launch-overlay" hidden aria-hidden="true">
      <div class="mobile-launch-panel" role="dialog" aria-modal="true" aria-labelledby="mobile-launch-title">
        <div class="mobile-launch-badge">iBET</div>
        <p class="mobile-launch-kicker">Lucky Wheel Mobile Launch</p>
        <h1 id="mobile-launch-title" class="mobile-launch-title"></h1>
        <div id="mobile-launch-orientation" class="mobile-launch-orientation" aria-hidden="true">
          <svg class="mobile-launch-orientation-icon" viewBox="0 0 220 138" role="presentation">
            <defs>
              <linearGradient id="rotatePhoneFill" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#dff5ff" />
                <stop offset="100%" stop-color="#8fdcff" />
              </linearGradient>
              <linearGradient id="rotateArrowFill" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#f47ab0" />
                <stop offset="100%" stop-color="#e2468d" />
              </linearGradient>
            </defs>
            <path class="mobile-launch-rotate-arrow" d="M146 28c15 4 27 14 34 26 7 13 8 28 3 42" fill="none" stroke="url(#rotateArrowFill)" stroke-width="12" stroke-linecap="round" />
            <path class="mobile-launch-rotate-arrow-head" d="M150 22 174 24 161 42" fill="#e2468d" />
            <path class="mobile-launch-rotate-arrow mobile-launch-rotate-arrow-secondary" d="M69 108c-15-5-26-14-33-26-7-13-9-28-4-42" fill="none" stroke="#18b5ff" stroke-width="12" stroke-linecap="round" />
            <path class="mobile-launch-rotate-arrow-head mobile-launch-rotate-arrow-head-secondary" d="M65 114 41 113 54 95" fill="#18b5ff" />
            <g class="mobile-launch-phone-cluster" transform="translate(110 73) rotate(-28)">
              <g class="mobile-launch-phone-portrait">
                <rect x="-34" y="-52" width="68" height="104" rx="18" fill="#17283b" />
                <rect x="-24" y="-37" width="48" height="74" rx="10" fill="url(#rotatePhoneFill)" />
                <circle cx="0" cy="42" r="4.5" fill="#62788e" />
              </g>
            </g>
          </svg>
          <p id="mobile-launch-orientation-label" class="mobile-launch-orientation-label"></p>
        </div>
        <ol id="mobile-launch-steps" class="mobile-launch-steps" hidden>
          <li>Tap the <strong>Share</strong> button in Safari.</li>
          <li>Select <strong>Add to Home Screen</strong>.</li>
          <li>Open Lucky Wheel from the new icon for a fullscreen launch.</li>
        </ol>
        <p id="mobile-launch-note" class="mobile-launch-note"></p>
        <div class="mobile-launch-actions">
          <button id="mobile-launch-primary" class="mobile-launch-button mobile-launch-button-primary" type="button"></button>
          <button id="mobile-launch-secondary" class="mobile-launch-button mobile-launch-button-secondary" type="button"></button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
