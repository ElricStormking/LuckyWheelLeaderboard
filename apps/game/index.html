<!doctype html>
<html lang="en" class="desktop-framed">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#020b11" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lucky Wheel" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <title>Lucky Wheel Prototype</title>
  </head>
  <body>
    <div id="app-shell">
      <div id="game-root"></div>
    </div>
    <div id="mobile-launch-overlay" hidden aria-hidden="true">
      <div class="mobile-launch-panel" role="dialog" aria-modal="true" aria-labelledby="mobile-launch-title">
        <div class="mobile-launch-badge">iBET</div>
        <p class="mobile-launch-kicker">Lucky Wheel Mobile Launch</p>
        <h1 id="mobile-launch-title" class="mobile-launch-title"></h1>
        <div id="mobile-launch-orientation" class="mobile-launch-orientation" aria-hidden="true">
          <svg class="mobile-launch-orientation-icon" viewBox="0 0 220 138" role="presentation">
            <defs>
              <linearGradient id="rotatePhoneFill" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#dff5ff" />
                <stop offset="100%" stop-color="#8fdcff" />
              </linearGradient>
              <linearGradient id="rotateArrowFill" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#f47ab0" />
                <stop offset="100%" stop-color="#e2468d" />
              </linearGradient>
            </defs>
            <g class="mobile-launch-phone-cluster" transform="translate(99 70)">
              <g transform="translate(0 12) rotate(-90)">
                <g class="mobile-launch-phone-landscape">
                  <rect x="-30" y="-44" width="60" height="88" rx="15" fill="none" stroke="#264761" stroke-width="8" opacity="0.28" />
                  <rect x="-22" y="-31" width="44" height="62" rx="8" fill="#ffffff" opacity="0.78" />
                </g>
              </g>
              <g transform="translate(34 -2)">
                <g class="mobile-launch-phone-portrait">
                  <rect x="-30" y="-44" width="60" height="88" rx="15" fill="#0f2740" opacity="0.16" />
                  <rect x="-32" y="-46" width="64" height="92" rx="17" fill="none" stroke="#17344c" stroke-width="8" />
                  <rect x="-23" y="-33" width="46" height="66" rx="9" fill="url(#rotatePhoneFill)" />
                  <circle cx="0" cy="36" r="4.5" fill="#17344c" opacity="0.48" />
                </g>
              </g>
            </g>
            <path class="mobile-launch-rotate-arrow" d="M70 42c10-16 25-24 44-24 16 0 30 6 42 18l10-10 8 34-34-8 10-10c-7-6-15-9-24-9-10 0-19 4-26 12-4 4-7 8-9 13z" fill="url(#rotateArrowFill)" />
            <path class="mobile-launch-rotate-arrow mobile-launch-rotate-arrow-secondary" d="M150 108c-11 8-23 12-37 12-19 0-35-7-49-20l-11 11-7-33 33 7-10 10c8 7 18 10 29 10 8 0 16-2 23-7 4-3 7-6 10-10l12 8c-5 5-10 9-17 12z" fill="#18b5ff" />
          </svg>
          <p id="mobile-launch-orientation-label" class="mobile-launch-orientation-label"></p>
        </div>
        <ol id="mobile-launch-steps" class="mobile-launch-steps" hidden>
          <li>Tap the <strong>Share</strong> button in Safari.</li>
          <li>Select <strong>Add to Home Screen</strong>.</li>
          <li>Open Lucky Wheel from the new icon for a fullscreen launch.</li>
        </ol>
        <p id="mobile-launch-note" class="mobile-launch-note"></p>
        <div class="mobile-launch-actions">
          <button id="mobile-launch-primary" class="mobile-launch-button mobile-launch-button-primary" type="button"></button>
          <button id="mobile-launch-secondary" class="mobile-launch-button mobile-launch-button-secondary" type="button"></button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
